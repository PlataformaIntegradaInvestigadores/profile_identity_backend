services:
  profile-identity-web:
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: root
    command: >
      sh -c "mkdir -p /app/media/profile_pictures
      && chown -R appuser:appuser /app/media
      && exec runuser -u appuser -- gunicorn profile_identity_project.wsgi:application --bind 0.0.0.0:8002 --workers 1 --threads 2 --timeout 60"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8002:8002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - profile-identity-db
    env_file:
      - .env
    environment:
      - DB_HOST=profile-identity-db
      - DB_PORT=5432
    networks:
      - default
      - centinela-net

  profile-identity-db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - profile_identity_postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-profile_identity}
      - POSTGRES_USER=${DB_USER:-profile_identity}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-profile_identity}
    networks:
      - default
      - centinela-net

volumes:
  profile_identity_postgres_data:

networks:
  centinela-net:
    external: true
